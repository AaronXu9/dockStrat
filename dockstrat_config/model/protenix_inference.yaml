# Protenix inference configuration (no-MSA / single-sequence mode).

# Dataset mode (runsNposes and friends)
dataset: runsNposes
benchmark: ${dataset}
repeat_index: 0
skip_existing: true
max_num_inputs: null

# Input: a dataset directory with per-system folders, each containing
# {id}_protein.pdb and {id}_ligand.sdf
input_dir: ${oc.env:PROJECT_ROOT}/data/${dataset}

# Output: rank{N}.sdf per system, plus cached Protenix JSON inputs and mmCIF outputs
output_dir: ${oc.env:PROJECT_ROOT}/forks/protenix/prediction_outputs/${dataset}_${repeat_index}

# Protenix binary and model
protenix_binary: ${oc.env:PROJECT_ROOT}/envs/protenix/bin/protenix
model_name: protenix-v2            # or protenix_base_default_v1.0.0

# Inference knobs
cuda_device_index: 0
seeds: "42"                        # comma-separated seed list
num_poses_to_keep: 5               # how many top-ranked SDFs to write
timeout_seconds: 3600              # per-system hard cap; on timeout, log + skip

# Logging
logging:
  level: INFO
  file: protenix_docking.log
  console: true
  log_dir: ${oc.env:PROJECT_ROOT}/logs
